name: Build Cross Platform

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: write

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: Windows
            mac_arch: ""
            artifact_name: LumaSuite-Windows
          - os: macos-15-intel
            platform: macOS
            mac_arch: x86_64
            artifact_name: LumaSuite-macOS-intel
          - os: macos-latest
            platform: macOS
            mac_arch: arm64
            artifact_name: LumaSuite-macOS-arm64
          - os: ubuntu-latest
            platform: Linux
            mac_arch: ""
            artifact_name: LumaSuite-Linux

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libx11-dev libxkbcommon-x11-0

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build-lock.txt

      - name: Build Windows
        if: runner.os == 'Windows'
        run: python build_executable.py windows

      - name: Build macOS
        if: runner.os == 'macOS'
        env:
          PYI_MACOS_ARCH: ${{ matrix.mac_arch }}
        run: python build_executable.py macos

      - name: Build Linux
        if: runner.os == 'Linux'
        run: python build_executable.py linux

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Windows/LumaSuite.exe

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macOS/*.app

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Linux/*

      - name: Upload Windows warning log
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: warn-${{ matrix.artifact_name }}
          path: build/Windows/LumaSuite/warn-LumaSuite.txt
          if-no-files-found: ignore

      - name: Upload macOS warning log
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: warn-${{ matrix.artifact_name }}
          path: build/macOS/LumaSuite/warn-LumaSuite.txt
          if-no-files-found: ignore

      - name: Upload Linux warning log
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: warn-${{ matrix.artifact_name }}
          path: build/Linux/LumaSuite/warn-LumaSuite.txt
          if-no-files-found: ignore

      - name: Package Windows release asset
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive -Path dist/Windows/LumaSuite.exe -DestinationPath "release/LumaSuite-${{ github.ref_name }}-windows.zip" -Force

      - name: Package macOS release asset
        if: runner.os == 'macOS'
        run: |
          mkdir -p release
          zip_name="release/LumaSuite-${{ github.ref_name }}-${{ matrix.mac_arch }}.zip"
          ditto -c -k --sequesterRsrc --keepParent dist/macOS/LumaSuite.app "$zip_name"

      - name: Package Linux release asset
        if: runner.os == 'Linux'
        run: |
          mkdir -p release
          tar -C dist/Linux -czf "release/LumaSuite-${{ github.ref_name }}-linux.tar.gz" LumaSuite LumaSuite.desktop LumaSuite.png run-lumasuite.sh install-lumasuite-desktop.sh

      - name: Upload packaged release asset
        uses: actions/upload-artifact@v5
        with:
          name: release-${{ matrix.artifact_name }}
          path: release/*
          if-no-files-found: error

  publish-release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: release-*
          merge-multiple: true
          path: release-assets

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*
