name: Build LumaSuite

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
          - os: macos-latest
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libx11-dev libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build-lock.txt

      - name: Build Windows
        if: runner.os == 'Windows'
        run: python build_executable.py windows

      - name: Build macOS
        if: runner.os == 'macOS'
        run: python build_executable.py macos

      - name: Build Linux
        if: runner.os == 'Linux'
        run: python build_executable.py linux

      - name: List dist output (debug)
        run: |
          python -c "import os; print('DIST TREE:'); [print(os.path.join(r, n)) for r, ds, fs in os.walk('dist') for n in (ds + fs)]"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: LumaSuite-Windows
          path: dist/Windows/*.exe
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: LumaSuite-macOS-universal
          path: dist/macOS/*.app
          if-no-files-found: error

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: LumaSuite-Linux
          path: dist/Linux/*
          if-no-files-found: error

      - name: Upload PyInstaller warning log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: warn-${{ runner.os }}
          path: |
            build/Windows/warn-LumaSuite.txt
            build/macOS/warn-LumaSuite.txt
            build/Linux/warn-LumaSuite.txt
