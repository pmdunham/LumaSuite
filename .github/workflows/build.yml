name: Build LumaSuite

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ${{ matrix.os }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mac_arch: ""
            artifact_name: LumaSuite-Linux
          - os: windows-latest
            mac_arch: ""
            artifact_name: LumaSuite-Windows
          - os: macos-15-intel
            mac_arch: x86_64
            artifact_name: LumaSuite-macOS-intel
          - os: macos-latest
            mac_arch: arm64
            artifact_name: LumaSuite-macOS-arm64
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install Linux GUI deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk libx11-dev libxkbcommon-x11-0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build-lock.txt

      - name: Build Windows
        if: runner.os == 'Windows'
        run: python build_executable.py windows

      - name: Build macOS
        if: runner.os == 'macOS'
        env:
          PYI_MACOS_ARCH: ${{ matrix.mac_arch }}
        run: python build_executable.py macos

      - name: Build Linux
        if: runner.os == 'Linux'
        run: python build_executable.py linux

      - name: List dist output (debug)
        run: |
          python -c "import os; print('DIST TREE:'); [print(os.path.join(r, n)) for r, ds, fs in os.walk('dist') for n in (ds + fs)]"

      - name: Upload Windows artifact
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Windows/*.exe
          if-no-files-found: error

      - name: Upload macOS artifact
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/macOS/*.app
          if-no-files-found: error

      - name: Upload Linux artifact
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/Linux/*
          if-no-files-found: error

      - name: Upload Windows warning log
        if: always() && runner.os == 'Windows'
        uses: actions/upload-artifact@v5
        with:
          name: warn-${{ matrix.artifact_name }}
          path: build/Windows/LumaSuite/warn-LumaSuite.txt
          if-no-files-found: ignore

      - name: Upload macOS warning log
        if: always() && runner.os == 'macOS'
        uses: actions/upload-artifact@v5
        with:
          name: warn-${{ matrix.artifact_name }}
          path: build/macOS/LumaSuite/warn-LumaSuite.txt
          if-no-files-found: ignore

      - name: Upload Linux warning log
        if: always() && runner.os == 'Linux'
        uses: actions/upload-artifact@v5
        with:
          name: warn-${{ matrix.artifact_name }}
          path: build/Linux/LumaSuite/warn-LumaSuite.txt
          if-no-files-found: ignore
