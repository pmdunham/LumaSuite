<!doctype html>
<html>
<head>
  <meta charset="utf-8"/>
  <title>Matrix Routing</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="icon" type="image/x-icon" href="/ui/favicon.ico">
  <link rel="stylesheet" href="matrix.css">
  <style>
    .nav-tabs { display:flex; gap:4px; border-bottom:2px solid var(--border); }
    .nav-tab { padding:6px 14px; text-decoration:none; color:var(--fg); border-radius:6px 6px 0 0; transition:all 0.2s; display:flex; align-items:center; gap:6px; cursor:pointer; font-size:13px; }
    .nav-tab:hover { background:rgba(30,144,255,0.1); color:#fff; }
    .nav-tab.active { background:var(--accent); color:#fff; border-bottom:2px solid var(--accent); margin-bottom:-2px; }
  </style>
</head>
<body>
  <!-- Connection Status Banner -->
  <div id="connection_banner" style="display:none; position:fixed; top:0; left:0; right:0; background:#d32f2f; color:white; padding:12px 20px; font-weight:bold; text-align:center; z-index:10000; box-shadow:0 2px 8px rgba(0,0,0,0.3);">
    ⚠️ Connection lost, check application.
  </div>
  <div class="row header" style="justify-content:space-between;align-items:center;">
    <div style="display:flex;align-items:center;gap:12px;">
      <img id="company_logo" src="/ui/companylogo.png" alt="Company Logo" style="height:48px;width:auto;border-radius:6px;">
      <h1 class="title" style="margin:0;">LumaSuite Device Manager</h1>
    </div>
    <div class="right" style="display:flex;align-items:center;gap:16px;">
      <div class="nav-tabs">
        <a class="nav-tab" href="/ui/index.html">
          <span>📊</span>
          <span>Device Manager</span>
        </a>
        <a class="nav-tab active" href="/ui/matrix.html">
          <span>🔀</span>
          <span>Matrix Routing</span>
        </a>
        <a class="nav-tab" href="/ui/producer.html">
          <span>🎬</span>
          <span>Production Studio</span>
        </a>
      </div>

    </div>
  </div>
  <div class="top">
    <div class="row">
      <button id="refreshBtn">Refresh</button>
      <div class="divider"></div>
      <label class="toggle" id="sticky_headers_label">
        <input type="checkbox" id="sticky_headers_toggle" />
        <div class="label">Lock Headers</div>
        <div id="sticky_switch" class="switch"><div class="knob"></div></div>
      </label>
    </div>
    <div class="legend">
      <!-- legend removed as requested -->
    </div>
  </div>
  <div class="matrix-area">
    <div class="matrix-wrap">
      <table id="matrix" class="matrix" aria-label="Routing matrix"></table>
    </div>
    <div style="display:flex;gap:24px;margin:18px 0 8px 0;align-items:center;">
      <div>
        <label for="encFilterInput"><b>Filter Encoders:</b></label>
        <input type="text" id="encFilterInput" placeholder="Type to filter encoders..." style="margin-left:8px;min-width:110px;width:110px;">
        <button id="encFilterClearBtn" type="button" style="margin-left:4px;">Clear</button>
      </div>
      <div>
        <label for="decFilterInput"><b>Filter Decoders:</b></label>
        <input type="text" id="decFilterInput" placeholder="Type to filter decoders..." style="margin-left:8px;min-width:110px;width:110px;">
        <button id="decFilterClearBtn" type="button" style="margin-left:4px;">Clear</button>
      </div>
    </div>
  </div>
  <div class="collapsible" id="encoders-section">
    <div class="header">
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
      <h3 style="margin:0;">Encoders</h3>
    </div>
    <div class="body">
      <div class="tbl-wrap"><table id="encTbl" class="grid" aria-label="Encoders table"></table></div>
    </div>
  </div>
  <div class="collapsible" id="decoders-section">
    <div class="header">
      <svg class="chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"></polyline>
      </svg>
      <h3 style="margin:0;">Decoders</h3>
    </div>
    <div class="body">
      <div class="tbl-wrap"><table id="decTbl" class="grid" aria-label="Decoders table"></table></div>
    </div>
  </div>
  <script src="matrix.js"></script>

<!-- Connection Monitoring -->
<script>
let connectionCheckInterval = null;
let heartbeatInterval = null;
let lastSuccessfulHeartbeat = Date.now();
const CONNECTION_TIMEOUT_MS = 15000;
const HEARTBEAT_INTERVAL_MS = 5000;

function showConnectionBanner() {
  const banner = document.getElementById("connection_banner");
  if(banner && banner.style.display === 'none') {
    banner.style.display = 'block';
    document.body.style.paddingTop = '50px';
  }
}

function hideConnectionBanner() {
  const banner = document.getElementById("connection_banner");
  if(banner && banner.style.display === 'block') {
    banner.style.display = 'none';
    document.body.style.paddingTop = '0';
  }
}

function startConnectionMonitoring() {
  if(heartbeatInterval) return;
  
  // Send heartbeat pings
  heartbeatInterval = setInterval(async () => {
    try {
      const response = await fetch('/api/heartbeat', { cache: 'no-store' });
      if(response.ok) {
        lastSuccessfulHeartbeat = Date.now();
        console.log('[ConnectionMonitor] Heartbeat successful, hiding banner');
        hideConnectionBanner();
      }
    } catch(e) {
      console.log('[ConnectionMonitor] Heartbeat failed:', e.message);
    }
  }, HEARTBEAT_INTERVAL_MS);
  
  // Check if heartbeat has stalled
  if(connectionCheckInterval) return;
  connectionCheckInterval = setInterval(async () => {
    const timeSinceLastSuccess = Date.now() - lastSuccessfulHeartbeat;
    if(timeSinceLastSuccess > CONNECTION_TIMEOUT_MS) {
      console.log('[ConnectionMonitor] CONNECTION TIMEOUT - showing banner after', CONNECTION_TIMEOUT_MS, 'ms without heartbeat');
      showConnectionBanner();
    }
  }, 2000);
}

function stopConnectionMonitoring() {
  if(heartbeatInterval) {
    clearInterval(heartbeatInterval);
    heartbeatInterval = null;
  }
  if(connectionCheckInterval) {
    clearInterval(connectionCheckInterval);
    connectionCheckInterval = null;
  }
}

const originalFetch = window.fetch;
window.fetch = async function(...args) {
  // Just pass through - heartbeat is handled separately
  try {
    const response = await originalFetch.apply(this, args);
    return response;
  } catch(e) {
    throw e;
  }
};

window.onbeforeunload = () => {
  stopConnectionMonitoring();
};

startConnectionMonitoring();
</script>
</body>
</html>
